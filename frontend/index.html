<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC Builder</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #e5e5e5;
      }

      .logo {
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .sign-in {
        text-decoration: none;
        color: inherit;
        padding: 8px 12px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .panel {
        width: 100%;
        max-width: 520px;
        display: grid;
        gap: 16px;
      }

      .field label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
      }


    input[type="number"],
    textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #d7d7d7;
        border-radius: 10px;
        font-size: 16px;
        font-family: inherit;
        font-weight: 400;
        line-height: 1.4;
    }

    input::placeholder,
    textarea::placeholder {
        font-family: inherit;
        font-weight: 400;
        opacity: 0.6;
    }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">PC-Builder</div>
      <a class="sign-in" href="#signin">Login</a>
    </header>

    <main>
      <section class="panel" aria-label="Build inputs">
        <div class="field">
          <label for="budget">Budget</label>
          <input id="budget" type="number" inputmode="numeric" min="0" placeholder="Enter your budget" />
        </div>

        <div class="field">
          <label for="preferences">Preferences</label>
          <textarea
            id="preferences"
            placeholder="Optionally, enter any preferences for your build here"
          ></textarea>
        </div>
      </section>
    </main>
  </body>
</html>
